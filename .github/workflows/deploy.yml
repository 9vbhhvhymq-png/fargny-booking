name: Deploy to Strato

# Deploys strato-deploy/ to Strato shared hosting via SFTP
# whenever changes are pushed to main.
#
# Required GitHub Secrets:
#   FTP_HOST     — e.g. 512020809.ssh.w1.strato.hosting
#   FTP_USER     — e.g. STU834724242
#   FTP_PASSWORD — your Strato SFTP password
#
# The contents of strato-deploy/ are uploaded to the /booking/ directory
# on the server using lftp (pure SFTP — no remote rsync needed).
# (trigger: re-run after password reset)

on:
  push:
    branches:
      - main
    paths:
      - 'strato-deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload via lftp (SFTP)
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USER }}
          # lftp reads the password from this env var when --env-password is set.
          # This avoids any shell escaping issues with special characters.
          LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Strip any accidental whitespace/newlines from host + user
          HOST="$(printf '%s' "$SFTP_HOST" | tr -d '[:space:]')"
          USER_="$(printf '%s' "$SFTP_USER" | tr -d '[:space:]')"

          lftp --env-password -u "$USER_" "sftp://$HOST" <<EOF
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 2
          set net:reconnect-interval-base 5
          mirror --reverse \
                 --verbose \
                 --delete \
                 --exclude-glob .git* \
                 --exclude-glob .env \
                 --exclude-glob node_modules/ \
                 ./strato-deploy/ /booking/
          bye
          EOF
