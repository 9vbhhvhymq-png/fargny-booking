name: Deploy to Strato

# Deploys strato-deploy/ to Strato shared hosting via SFTP
# whenever changes are pushed to main.
#
# Required GitHub Secrets:
#   FTP_HOST     — e.g. 512020809.ssh.w1.strato.hosting
#   FTP_USER     — e.g. STU834724242
#   FTP_PASSWORD — your Strato SFTP password
#
# The contents of strato-deploy/ are uploaded to the /booking/ directory
# on the server using lftp (pure SFTP — no remote rsync needed).

on:
  push:
    branches:
      - main
    paths:
      - 'strato-deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload via lftp (SFTP)
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USER }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Strip any accidental whitespace/newlines from secrets
          HOST="$(echo -n "$SFTP_HOST" | tr -d '[:space:]')"
          USER_="$(echo -n "$SFTP_USER" | tr -d '[:space:]')"

          lftp -u "$USER_","$SFTP_PASS" "sftp://$HOST" <<EOF
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 2
          set net:reconnect-interval-base 5
          mirror --reverse \
                 --verbose \
                 --delete \
                 --exclude-glob .git* \
                 --exclude-glob .env \
                 --exclude-glob node_modules/ \
                 ./strato-deploy/ /booking/
          bye
          EOF
