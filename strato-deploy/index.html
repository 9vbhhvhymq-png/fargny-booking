// Resolve API path relative to where this page is served from,
// so it works at /booking/api/ or any other sub-path.
const _pageBase = new URL('.', window.location.href).href.replace(/\/$/, '');
const API_BASE = _pageBase + '/api';

async function api(path, options = {}) {
  const token = localStorage.getItem('fargny_token');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API_BASE}/${path}`, { ...options, headers });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'API error');
  return data.data;
}

// ═══════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════
function toISO(date) {
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}
function parseISO(s) { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function generateWeeks(year) {
  const weeks=[]; let d=new Date(year,0,1);
  while(d.getDay()!==6) d.setDate(d.getDate()+1);
  let weekNum=1;
  while(d.getFullYear()<=year){
    const start=new Date(d), end=new Date(d); end.setDate(end.getDate()+6);
    if(start.getFullYear()!==year) break;
    weeks.push({id:year+'-W'+String(weekNum).padStart(2,'0'),weekNum,start:toISO(start),end:toISO(end),month:start.getMonth()});
    d.setDate(d.getDate()+7); weekNum++;
  }
  return weeks;
}
function formatDate(iso,lang){if(!iso)return'';const p=iso.split('-');return parseInt(p[2])+' '+MONTHS_SHORT[lang][parseInt(p[1])-1];}
function formatFullDate(iso,lang){if(!iso)return'';const p=iso.split('-');return parseInt(p[2])+' '+MONTHS_SHORT[lang][parseInt(p[1])-1]+' '+p[0];}
function diffDays(a,b){ return Math.round((parseISO(b)-parseISO(a))/(86400000)); }
function shortName(fullName){
  if(!fullName) return '';
  const parts=fullName.trim().split(/\s+/);
  if(parts.length===1) return parts[0];
  return parts[0]+' '+parts[parts.length-1].charAt(0)+'.';
}
function isWeekBookableRegular(weekStart){
  const today=new Date();today.setHours(0,0,0,0);
  const start=parseISO(weekStart);
  const sixBefore=new Date(start);sixBefore.setMonth(sixBefore.getMonth()-6);
  return today>=sixBefore;
}
function regularOpenDate(weekStart){
  const start=parseISO(weekStart);
  const sixBefore=new Date(start);sixBefore.setMonth(sixBefore.getMonth()-6);
  return toISO(sixBefore);
}
function getPhaseMeta(phase,t){
  return {
    clan:{name:t.clanName,desc:t.clanDesc,rule:t.clanRule,icon:PHASES.clan.icon},
    priority:{name:t.priorityName,desc:t.priorityDesc,rule:t.priorityRule,icon:PHASES.priority.icon},
    regular:{name:t.regularName,desc:t.regularDesc,rule:t.regularRule,icon:PHASES.regular.icon},
    board:{name:t.boardBookings,desc:t.boardDesc,rule:t.boardRule,icon:PHASES.board.icon},
  }[phase];
}
function phaseColor(p){return p==='clan'?'#B85042':p==='priority'?'#C4853B':p==='board'?'#5B21B6':'#4A7C59';}
function getPhaseName(p,t){return{clan:t.clanName,priority:t.priorityName,regular:t.regularName,board:t.boardBookings}[p]||p;}
function getPhaseStatus(phaseId, cfg){
  if(!cfg) return 'active';
  const today=toISO(new Date());
  if(phaseId==='clan'){
    if(today<cfg.clan_start) return 'upcoming';
    if(today<=cfg.clan_end) return 'active';
    return 'closed';
  }
  if(phaseId==='priority'){
    if(today<cfg.priority_start) return 'upcoming';
    if(today<=cfg.priority_end) return 'active';
    return 'closed';
  }
  if(phaseId==='board') return 'active';
  if(today<cfg.regular_start) return 'upcoming';
  return 'active';
}
function getPhaseWindow(phaseId, cfg, lang){
  if(!cfg) return '';
  if(phaseId==='clan') return formatDate(cfg.clan_start,lang)+' \u2013 '+formatDate(cfg.clan_end,lang);
  if(phaseId==='priority') return formatDate(cfg.priority_start,lang)+' \u2013 '+formatDate(cfg.priority_end,lang);
  if(phaseId==='board') return '';
  return (lang==='nl'?'Opent 1 jan, boekbaar tot 6 maanden vooruit':'Opens 1 Jan, bookable up to 6 months ahead');
}
function calcBookingCost(guests, weekStart){
  if(!guests||!weekStart) return {house:0,person:0,cleaning:CLEANING_FEE,total:CLEANING_FEE,nightsStayed:0};
  let nightsWithPeople=0, personFee=0;
  const g = guests;
  const c04 = g.child04 || (g.child04 === undefined ? [] : g.child04);
  const c59 = g.child59 || [];
  const ad = g.adult || [];
  for(let n=0;n<7;n++){
    const a=c04[n]||0, b=c59[n]||0, c=ad[n]||0;
    if(a+b+c>0) nightsWithPeople++;
    personFee += b*RATES.child59 + c*RATES.adult;
  }
  const house=HOUSE_FEE*nightsWithPeople;
  return {house,person:personFee,cleaning:CLEANING_FEE,total:house+personFee+CLEANING_FEE,nightsStayed:nightsWithPeople};
}

  const map={not_paid:{label:t.notPaid,color:'#DC2626',bg:'#FEF2F2'},invoice_sent:{label:t.invoiceSent,color:'#D97706',bg:'#FFFBEB'},paid:{label:t.paid,color:'#059669',bg:'#ECFDF5'}};
  const s=map[status]||map.not_paid;
  return <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:10,background:s.bg,color:s.color,whiteSpace:'nowrap'}}>{s.label}</span>;
}

  const w = weeks.find(wk=>wk.id===booking.week_id);
  const dayLabels=[t.sat,t.sun,t.mon,t.tue,t.wed,t.thu,t.fri];

  const [guests, setGuests] = React.useState(()=>JSON.parse(JSON.stringify(initGuests)));

  const cellStyle={width:42,padding:'6px 2px',border:'1px solid '+COLORS.border,borderRadius:4,fontSize:13,textAlign:'center',outline:'none',fontFamily:"'DM Sans',sans-serif"};

        {w && <p style={{fontSize:13,color:COLORS.muted,margin:'0 0 16px 0'}}>W{w.weekNum}: {formatDate(w.start,lang)} &ndash; {formatDate(w.end,lang)}</p>}
        <div style={{overflowX:'auto',marginBottom:16}}>
          <table style={{borderCollapse:'collapse',width:'100%',fontSize:12}}>
            <thead><tr><th style={{textAlign:'left',padding:'6px 8px',fontSize:11,color:COLORS.muted}}></th>

              {rows.map(row =>
                <tr key={row.key}>
                  <td style={{padding:'6px 8px',fontSize:12,fontWeight:500,color:COLORS.text,whiteSpace:'nowrap'}}>{row.label} <span style={{color:COLORS.muted,fontSize:10}}>{row.rate}/{t.nightLabel.toLowerCase()}</span></td>
                  {[0,1,2,3,4,5,6].map(col=>
                    <td key={col} style={{padding:'4px 2px',textAlign:'center'}}>
                      <input type="number" min={0} value={guests[row.key][col]} onChange={e=>setCell(row.key,col,e.target.value)} style={cellStyle}/>
                    </td>
                  )}
                </tr>
              )}
            </tbody>
          </table>
        </div>
        <div style={{background:'#F8F5F2',borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:COLORS.muted,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>{t.costSummary}</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span>{t.houseFee} (&euro;{HOUSE_FEE} &times; {cost.nightsStayed} {t.nights})</span><span style={{fontWeight:600}}>&euro;{cost.house.toFixed(2)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span>{t.perPerson}</span><span style={{fontWeight:600}}>&euro;{cost.person.toFixed(2)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span>{t.cleaningFee}</span><span style={{fontWeight:600}}>&euro;{CLEANING_FEE.toFixed(2)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:700,color:COLORS.text,borderTop:'1px solid '+COLORS.border,paddingTop:8,marginTop:4}}><span>{t.totalCost}</span><span>&euro;{cost.total.toFixed(2)}</span></div>
          </div>
        </div>
        <div style={{background:'#3B6B9E0A',border:'1px solid #3B6B9E20',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#3B6B9E',lineHeight:1.5,marginBottom:16}}>{t.bankInstructions}</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:'11px 0',background:COLORS.bg,border:'none',borderRadius:10,fontSize:14,fontWeight:500,color:'#5A4D40',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.close}</button>
          <button onClick={()=>onSave(booking.id,guests,cost.total)} style={{flex:1,padding:'11px 0',background:COLORS.success,border:'none',borderRadius:10,fontSize:14,fontWeight:600,color:'white',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.saveCosts}</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// BOOKING DIALOG
// ═══════════════════════════════════════════════════════
function BookingDialog({week, phase, user, registeredUsers=[], onConfirm, onCancel, t, lang}){
  const [openToShare, setOpenToShare] = React.useState(false);
  const [remark, setRemark] = React.useState('');
  const [linked, setLinked] = React.useState([]);
  const [useCustom, setUseCustom] = React.useState(false);
  const [checkIn, setCheckIn] = React.useState(week?week.start:'');
  const [checkOut, setCheckOut] = React.useState(week?week.end:'');
  const isRegular = phase==='regular';
  const others = registeredUsers.filter(u=>u.email!==user.email);
  const toggleLinked = (email)=>setLinked(prev=>prev.includes(email)?prev.filter(e=>e!==email):[...prev,email]);
  const weekLabel = week ? formatDate(week.start,lang)+' \u2014 '+formatDate(week.end,lang) : '';
  let customValid=true, nightCount=0;
  if(isRegular && useCustom){
    if(checkIn && checkOut){nightCount=diffDays(checkIn,checkOut);if(nightCount<1||nightCount>7)customValid=false;}
    else customValid=false;
  }
  const iS={width:'100%',padding:'10px 14px',border:'1.5px solid '+COLORS.border,borderRadius:10,fontSize:14,outline:'none',fontFamily:"'DM Sans',sans-serif",boxSizing:'border-box'};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} style={{background:COLORS.white,borderRadius:16,padding:28,width:460,maxHeight:'85vh',overflow:'auto',boxShadow:'0 12px 48px rgba(0,0,0,0.15)'}}>
        <h3 style={{fontSize:18,fontWeight:700,color:COLORS.text,margin:'0 0 6px 0',fontFamily:"'Playfair Display',Georgia,serif"}}>{t.confirmBooking}</h3>
        <p style={{fontSize:14,color:COLORS.text,margin:'0 0 20px 0'}}>{t.confirmBookQ} {weekLabel}?</p>
        {isRegular && <div style={{marginBottom:16}}>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:COLORS.text,cursor:'pointer',marginBottom:10}}>
            <input type="checkbox" checked={useCustom} onChange={()=>setUseCustom(!useCustom)}/>{t.customDates}
          </label>
          {useCustom && <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><label style={{fontSize:11,fontWeight:600,color:COLORS.muted,display:'block',marginBottom:4}}>{t.checkIn}</label><input style={iS} type="date" value={checkIn} onChange={e=>setCheckIn(e.target.value)}/></div>
            <div style={{flex:1}}><label style={{fontSize:11,fontWeight:600,color:COLORS.muted,display:'block',marginBottom:4}}>{t.checkOut}</label><input style={iS} type="date" value={checkOut} onChange={e=>setCheckOut(e.target.value)}/></div>
          </div>}
          {useCustom && !customValid && <div style={{fontSize:12,color:COLORS.danger,marginTop:6}}>{t.maxNights}</div>}
        </div>}
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:COLORS.text,cursor:'pointer',marginBottom:16}}>
          <input type="checkbox" checked={openToShare} onChange={()=>setOpenToShare(!openToShare)}/>{t.openToShare}
        </label>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,fontWeight:600,color:COLORS.muted,display:'block',marginBottom:6}}>{t.addRemark}</label>
          <textarea style={{...iS,resize:'vertical'}} rows={2} value={remark} onChange={e=>setRemark(e.target.value)}/>
        </div>
        {others.length>0 && <div style={{marginBottom:16}}>
          <label style={{fontSize:12,fontWeight:600,color:COLORS.muted,display:'block',marginBottom:6}}>{t.whoJoining}</label>
          <div style={{maxHeight:120,overflow:'auto',display:'flex',flexDirection:'column',gap:4}}>
            {others.map(u=>{
              const sel=linked.includes(u.email);
              return <label key={u.email} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,padding:'6px 10px',borderRadius:8,background:sel?COLORS.success+'10':'#F8F5F2',cursor:'pointer',border:sel?'1px solid '+COLORS.success+'30':'1px solid transparent'}}>
                <input type="checkbox" checked={sel} onChange={()=>toggleLinked(u.email)}/>{u.display_name||u.name}
              </label>;
            })}
          </div>
        </div>}
        <div style={{display:'flex',gap:8}}>
          <button onClick={onCancel} style={{flex:1,padding:'11px 0',background:COLORS.bg,border:'none',borderRadius:10,fontSize:14,fontWeight:500,color:'#5A4D40',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.cancelBtn}</button>
          <button onClick={()=>onConfirm({open_to_share:openToShare,remark,linked_members:linked,custom_start:isRegular&&useCustom&&customValid?checkIn:null,custom_end:isRegular&&useCustom&&customValid?checkOut:null})} disabled={isRegular&&useCustom&&!customValid} style={{flex:1,padding:'11px 0',background:(isRegular&&useCustom&&!customValid)?'#D4C5B5':COLORS.success,border:'none',borderRadius:10,fontSize:14,fontWeight:600,color:'white',cursor:(isRegular&&useCustom&&!customValid)?'default':'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.yesBook}</button>
        </div>
      </div>
    </div>
  );
}

        </div>

        {tab==='email' && <div style={{display:'flex',flexDirection:'column',gap:14}}>

              {paymentBadge(b.payment_status||'not_paid',t)}

          <button onClick={onClose} style={{padding:'11px 0',background:'#F5F0EB',border:'none',borderRadius:10,fontSize:14,fontWeight:500,color:'#5A4D40',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.close}</button>
        </div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// WEEK ROW
// ═══════════════════════════════════════════════════════
function WeekRow({week, myBooking, allBookings=[], onBook, onRequestCancel, user, phase, clanBookedByBranch, userBookedPriority, phaseActive, t, lang}){
  const hasMyBooking = !!myBooking;
  const userBranch = FAMILY_BRANCHES.find(b=>b.id===user.branch_id);
  const isPending = hasMyBooking && myBooking.cancellation_status==='pending';
  let weekBookedByOther=false, weekNotOpen=false;
  if(phase==='regular' && !hasMyBooking){
    const confirmed = allBookings.filter(b=>b.week_id===week.id && b.cancellation_status!=='approved');
    if(confirmed.length>0) weekBookedByOther=true;
    if(!isWeekBookableRegular(week.start)) weekNotOpen=true;
  }
  let bookable=false, reason='';
  if(!hasMyBooking && phaseActive){
    if(phase==='clan'){if(clanBookedByBranch)reason=t.branchAlreadyBooked;else bookable=true;}
    else if(phase==='priority'){if(userBookedPriority)reason=t.youAlreadyBooked;else bookable=true;}
    else{if(weekBookedByOther)reason=t.weekBookedByOther;else if(weekNotOpen)reason=t.weekNotYetOpen+' '+formatFullDate(regularOpenDate(week.start),lang);else bookable=true;}
  }
  const barColor = hasMyBooking&&myBooking.open_to_share ? COLORS.openToShare : (userBranch?userBranch.color:'#ccc');
  const pm = hasMyBooking ? getPhaseMeta(myBooking.phase,t) : null;

  return (
    <div style={{display:'flex',alignItems:'center',padding:'10px 16px',borderRadius:10,background:isPending?'#FEF2F210':hasMyBooking?barColor+'0D':'transparent',transition:'all 0.2s',gap:12,borderLeft:isPending?'3px solid '+COLORS.warning:hasMyBooking?'3px solid '+barColor:'3px solid transparent',opacity:isPending?0.7:1}}>
      <div style={{width:36,textAlign:'center',fontSize:13,fontWeight:600,color:COLORS.muted}}>W{week.weekNum}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:500,color:COLORS.text,textDecoration:isPending?'line-through':'none'}}>{formatDate(week.start,lang)} &mdash; {formatDate(week.end,lang)}</div>
        {hasMyBooking && !isPending && <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
          <span style={{fontSize:12,color:barColor,fontWeight:600}}>{t.yourBooking} &middot; {pm?pm.name:myBooking.phase}{myBooking.open_to_share?' \u00B7 \u{1F91D}':''}{myBooking.admin_booked?' \u00B7 '+t.adminBooking:''}</span>
        </div>}
        {hasMyBooking && myBooking.remarks && <div style={{fontSize:11,color:COLORS.muted,marginTop:2,fontStyle:'italic'}}>{'\u{1F4AC}'} {myBooking.remarks}</div>}
        {isPending && <div style={{fontSize:12,color:COLORS.warning,fontWeight:600,marginTop:2}}>{'\u23F3'} {t.pendingCancellation}</div>}
        {!hasMyBooking && reason && <div style={{fontSize:11,color:weekBookedByOther?COLORS.danger:'#B0A090',marginTop:2}}>{reason}</div>}
      </div>
      <div style={{display:'flex',gap:6}}>
        {hasMyBooking && !isPending && <button onClick={()=>onRequestCancel(myBooking)} style={{padding:'6px 14px',background:'transparent',border:'1.5px solid #D4C5B5',borderRadius:8,fontSize:12,color:COLORS.muted,cursor:'pointer',fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>{t.requestCancel}</button>}
        {isPending && <span style={{fontSize:11,color:COLORS.warning,fontWeight:600}}>{'\u23F3'}</span>}
        {!hasMyBooking && bookable && <button onClick={()=>onBook(week)} style={{padding:'6px 14px',background:COLORS.success,border:'none',borderRadius:8,fontSize:12,color:COLORS.white,cursor:'pointer',fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>{t.bookBtn}</button>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// BOOKING VIEW (main booking screen)
// ═══════════════════════════════════════════════════════
function BookingView({user, bookings=[], myBookings=[], weeks, year, setYear, phase, setPhase, phaseConfig, filterMonth, setFilterMonth, onSelectBranch, onShowAdmin, onBook, onRequestCancel, onSaveGuests, boardEvents=[], onSignUpBoard, onUnsignUpBoard, onCreateEvent, registeredUsers=[], branchData=[], showToast, t, lang}){
  const [costBooking, setCostBooking] = React.useState(null);
  const [bookDialog, setBookDialog] = React.useState(null);
  // Inline "create special event" form state
  const [showNewEvent, setShowNewEvent] = React.useState(false);
  const [evName, setEvName] = React.useState('');
  const [evStart, setEvStart] = React.useState('');
  const [evEnd, setEvEnd] = React.useState('');
  const [evDesc, setEvDesc] = React.useState('');
  const submitEvent = async ()=>{
    if(!evName || !evStart || !evEnd) return;
    await onCreateEvent({name:evName,start_date:evStart,end_date:evEnd,description:evDesc});
    setEvName('');setEvStart('');setEvEnd('');setEvDesc('');setShowNewEvent(false);
  };

  const myBookingMap = {};
  myBookings.filter(b=>b.year===year).forEach(b=>{if(b.week_id)myBookingMap[b.week_id]=b;});
  const clanBookedByBranch = bookings.find(b=>b.branch_id===user.branch_id && b.phase==='clan' && b.cancellation_status!=='approved');
  const userBookedPriority = bookings.find(b=>(b.user_id===user.id) && b.phase==='priority' && b.cancellation_status!=='approved');
  const filteredWeeks = filterMonth!==null ? weeks.filter(w=>w.month===filterMonth) : weeks;
  const userBranch = FAMILY_BRANCHES.find(b=>b.id===user.branch_id);
  const branchCounts = {};
  (branchData||[]).forEach(br=>{branchCounts[br.id]=br.member_count||0;});

  return (
    <div style={{display:'flex',maxWidth:1200,margin:'0 auto',gap:24,padding:'24px 20px'}}>
      {costBooking && <CostCalculator booking={costBooking} weeks={weeks} onSave={(id,guests)=>{onSaveGuests(id,guests);setCostBooking(null);}} onClose={()=>setCostBooking(null)} t={t} lang={lang}/>}
      {bookDialog && <BookingDialog week={bookDialog.week} phase={bookDialog.phase} user={user} registeredUsers={registeredUsers} onConfirm={opts=>{onBook(bookDialog.week,bookDialog.phase,opts);setBookDialog(null);}} onCancel={()=>setBookDialog(null)} t={t} lang={lang}/>}

      {/* SIDEBAR */}
      <div style={{width:300,flexShrink:0,display:'flex',flexDirection:'column',gap:16}}>
        <div style={{background:COLORS.white,borderRadius:14,padding:20,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:11,fontWeight:700,color:COLORS.muted,textTransform:'uppercase',letterSpacing:'1px',margin:'0 0 12px 0'}}>{t.bookingPhase}</h3>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {PHASE_ORDER.map(pid=>{
              const pm=getPhaseMeta(pid,t), status=getPhaseStatus(pid,phaseConfig), pc=phaseColor(pid), isCurrent=phase===pid, win=getPhaseWindow(pid,phaseConfig,lang);
              return <button key={pid} onClick={()=>setPhase(pid)} style={{display:'flex',flexDirection:'column',gap:4,padding:'12px 14px',border:isCurrent?'1.5px solid '+pc:'1.5px solid transparent',borderRadius:10,background:isCurrent?pc+'0A':'#F8F5F2',cursor:'pointer',textAlign:'left',opacity:status==='upcoming'||status==='closed'?0.55:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:16}}>{pm.icon}</span>
                  <span style={{fontSize:13,fontWeight:600,color:isCurrent?pc:COLORS.text}}>{pm.name}</span>
                  {status==='active' && <span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:8,background:COLORS.success+'20',color:COLORS.success}}>{t.active}</span>}
                  {status==='closed' && <span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:8,background:'#DC262620',color:'#DC2626'}}>{t.closed}</span>}
                  {status==='upcoming' && <span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:8,background:COLORS.warning+'20',color:COLORS.warning}}>{t.opens}</span>}
                </div>
                <div style={{fontSize:11,color:COLORS.muted,marginLeft:24}}>{pm.rule}</div>
                <div style={{fontSize:10,color:isCurrent?pc:COLORS.muted,marginLeft:24,fontWeight:500}}>{win}</div>
              </button>;
            })}
          </div>
        </div>

        <div style={{background:COLORS.white,borderRadius:14,padding:20,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:11,fontWeight:700,color:COLORS.muted,textTransform:'uppercase',letterSpacing:'1px',margin:'0 0 12px 0'}}>{t.year}</h3>
          <div style={{display:'flex',gap:8}}>
            {[2026,2027].map(y=><button key={y} onClick={()=>setYear(y)} style={{flex:1,padding:'10px 0',border:year===y?'1.5px solid '+COLORS.success:'1.5px solid '+COLORS.border,borderRadius:8,background:year===y?COLORS.success+'0D':COLORS.white,color:year===y?COLORS.success:COLORS.muted,fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{y}</button>)}
          </div>
        </div>

        <div style={{background:COLORS.white,borderRadius:14,padding:20,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:11,fontWeight:700,color:COLORS.muted,textTransform:'uppercase',letterSpacing:'1px',margin:'0 0 12px 0'}}>{t.myBookings} ({myBookings.length})</h3>
          {myBookings.length===0 ? <p style={{fontSize:13,color:'#B0A090',margin:0}}>{t.noBookingsYet}</p>
          : <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {myBookings.map(b=>{
                const bYear=b.year||year;const bWeeks=bYear===year?weeks:generateWeeks(bYear);const w=bWeeks.find(wk=>wk.id===b.week_id);if(!w) return null;
                const isPending=b.cancellation_status==='pending';const pm=getPhaseMeta(b.phase,t);
                return <div key={b.id} style={{padding:'8px 12px',background:isPending?'#FEF2F2':'#F8F5F2',borderRadius:8,borderLeft:'3px solid '+(isPending?COLORS.warning:b.open_to_share?COLORS.openToShare:(userBranch?userBranch.color:'#ccc')),opacity:isPending?0.7:1,cursor:isPending?'default':'pointer'}} onClick={isPending?null:()=>setCostBooking(b)}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{fontSize:13,fontWeight:500,color:COLORS.text,textDecoration:isPending?'line-through':'none'}}>{bYear!==year?bYear+' \u00B7 ':''}{formatDate(b.check_in_date||w.start,lang)} &mdash; {formatDate(b.check_out_date||w.end,lang)}</div>
                  </div>
                  {isPending ? <div style={{fontSize:11,color:COLORS.warning,marginTop:2,fontWeight:600}}>{'\u23F3'} {t.pendingCancellation}</div>
                  : <div style={{fontSize:11,color:COLORS.muted,marginTop:2}}>W{w.weekNum} &middot; {pm?pm.name:b.phase}{b.open_to_share?' \u00B7 \u{1F91D}':''}{b.admin_booked?' \u00B7 '+t.adminBooking:''}</div>}
                </div>;
              })}
            </div>}
        </div>

        <div style={{background:COLORS.white,borderRadius:14,padding:20,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontSize:11,fontWeight:700,color:COLORS.muted,textTransform:'uppercase',letterSpacing:'1px',margin:'0 0 12px 0'}}>{t.familyBranches}</h3>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {(branchData.length>0?branchData:FAMILY_BRANCHES).map(b=>{const mc=b.member_count||branchCounts[b.id]||0;
              return <button key={b.id} onClick={()=>onSelectBranch(b)} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,padding:'8px 10px',borderRadius:8,border:'none',background:'transparent',cursor:'pointer',width:'100%',textAlign:'left',fontFamily:"'DM Sans',sans-serif"}}>
                <div style={{width:10,height:10,borderRadius:3,background:b.color,flexShrink:0}}/><span style={{color:COLORS.text,flex:1}}>{b.name}</span><span style={{fontSize:11,color:'#B0A090'}}>{mc}{'\u{1F464}'}</span>
              </button>;})}
          </div>
          <p style={{fontSize:11,color:'#B0A090',margin:'10px 0 0 0'}}>{t.clickBranch}</p>
        </div>

        {user.is_admin && <button onClick={onShowAdmin} style={{padding:'12px 16px',background:'#C4853B10',border:'1.5px solid #C4853B30',borderRadius:12,fontSize:13,fontWeight:600,color:'#C4853B',cursor:'pointer',display:'flex',alignItems:'center',gap:8,justifyContent:'center',fontFamily:"'DM Sans',sans-serif"}}>{'\u{1F511}'} {t.admin}</button>}
      </div>

      {/* MAIN CONTENT */}
      <div style={{flex:1,minWidth:0}}>
        {phase==='board' ?
          <div style={{background:COLORS.white,borderRadius:14,padding:20,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,marginBottom:16}}>
              <div>
                <h3 style={{fontSize:16,fontWeight:700,color:COLORS.board,margin:'0 0 4px 0',fontFamily:"'Playfair Display',Georgia,serif"}}>{'\u{2728}'} {t.boardBookings}</h3>
                <p style={{fontSize:13,color:COLORS.muted,margin:0}}>{t.boardDesc}</p>
              </div>
              <button onClick={()=>setShowNewEvent(v=>!v)} style={{padding:'8px 14px',background:showNewEvent?'#F5F0EB':COLORS.board,border:'none',borderRadius:10,fontSize:13,fontWeight:600,color:showNewEvent?COLORS.text:'white',cursor:'pointer',whiteSpace:'nowrap',fontFamily:"'DM Sans',sans-serif"}}>{showNewEvent?('\u2715 '+t.close):('\u271A '+t.newEventBtn)}</button>
            </div>

            {showNewEvent && <div style={{display:'flex',flexDirection:'column',gap:10,padding:16,background:COLORS.board+'08',borderRadius:12,marginBottom:16,border:'1px solid '+COLORS.board+'30'}}>
              <h4 style={{fontSize:14,fontWeight:700,color:COLORS.text,margin:0}}>{t.createBoardEvent}</h4>
              <input type="text" placeholder={t.eventName} value={evName} onChange={e=>setEvName(e.target.value)} style={{padding:'10px 12px',border:'1px solid '+COLORS.border,borderRadius:8,fontSize:13,fontFamily:"'DM Sans',sans-serif"}}/>
              <div style={{display:'flex',gap:10}}>
                <label style={{flex:1,fontSize:11,color:COLORS.muted,fontWeight:600}}>{t.eventStart}
                  <input type="date" value={evStart} onChange={e=>setEvStart(e.target.value)} style={{width:'100%',marginTop:4,padding:'9px 10px',border:'1px solid '+COLORS.border,borderRadius:8,fontSize:13,fontFamily:"'DM Sans',sans-serif"}}/>
                </label>
                <label style={{flex:1,fontSize:11,color:COLORS.muted,fontWeight:600}}>{t.eventEnd}
                  <input type="date" value={evEnd} onChange={e=>setEvEnd(e.target.value)} style={{width:'100%',marginTop:4,padding:'9px 10px',border:'1px solid '+COLORS.border,borderRadius:8,fontSize:13,fontFamily:"'DM Sans',sans-serif"}}/>
                </label>
              </div>
              <textarea placeholder={t.eventDesc} value={evDesc} onChange={e=>setEvDesc(e.target.value)} rows={3} style={{padding:'10px 12px',border:'1px solid '+COLORS.border,borderRadius:8,fontSize:13,resize:'vertical',fontFamily:"'DM Sans',sans-serif"}}/>
              <button onClick={submitEvent} disabled={!evName||!evStart||!evEnd} style={{padding:'10px 0',background:(!evName||!evStart||!evEnd)?'#D4C5B5':COLORS.board,border:'none',borderRadius:10,fontSize:14,fontWeight:600,color:'white',cursor:(!evName||!evStart||!evEnd)?'default':'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.createBoardEvent}</button>
            </div>}

            {boardEvents.length===0 ? <div style={{padding:40,textAlign:'center',color:COLORS.muted}}>{t.noEvents}</div>
            : <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {boardEvents.map(ev=>{
                  const isMember = ev.user_signed_up;
                  return <div key={ev.id} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'14px 18px',borderRadius:12,background:COLORS.board+'08',borderLeft:'3px solid '+COLORS.board}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:600,color:COLORS.text}}>{ev.name}</div>
                      <div style={{fontSize:13,color:COLORS.muted,marginTop:2}}>{formatDate(ev.start_date,lang)} &ndash; {formatDate(ev.end_date,lang)}</div>
                      {ev.description && <div style={{fontSize:12,color:COLORS.muted,marginTop:4,fontStyle:'italic'}}>{'\u{1F4AC}'} {ev.description}</div>}
                      {ev.creator_name && <div style={{fontSize:11,color:COLORS.muted,marginTop:4}}>{t.createdBy}: <strong>{ev.creator_name}</strong></div>}
                      <div style={{fontSize:12,color:COLORS.board,marginTop:6,fontWeight:600}}>{ev.signup_count||0} {t.participants}</div>
                      {ev.participants && ev.participants.length>0 && <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>
                        {ev.participants.map(p=><span key={p.user_id} style={{fontSize:11,padding:'3px 9px',background:COLORS.board+'18',color:COLORS.board,borderRadius:10,fontWeight:500}}>{p.display_name}</span>)}
                      </div>}
                    </div>
                    <button onClick={()=>{isMember?onUnsignUpBoard(ev.id):onSignUpBoard(ev.id);}} style={{padding:'8px 14px',background:isMember?'transparent':COLORS.board,border:isMember?'1.5px solid '+COLORS.board:'none',borderRadius:10,fontSize:12,color:isMember?COLORS.board:'white',cursor:'pointer',fontWeight:600,whiteSpace:'nowrap',fontFamily:"'DM Sans',sans-serif"}}>{isMember?('\u2715 '+t.cancelSignup):('\u2705 '+t.signUp)}</button>
                  </div>;
                })}
              </div>}
          </div>
        : <>
          <div style={{display:'flex',gap:4,marginBottom:16,flexWrap:'wrap'}}>
            <button onClick={()=>setFilterMonth(null)} style={{padding:'6px 12px',borderRadius:8,border:'none',background:filterMonth===null?COLORS.text:'#E8DFD5',color:filterMonth===null?COLORS.white:COLORS.muted,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.all}</button>
            {MONTHS_SHORT[lang].map((m,i)=>{if(!weeks.some(w=>w.month===i))return null;
              return <button key={m} onClick={()=>setFilterMonth(i)} style={{padding:'6px 12px',borderRadius:8,border:'none',background:filterMonth===i?COLORS.text:'#E8DFD5',color:filterMonth===i?COLORS.white:COLORS.muted,fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{m}</button>;})}
          </div>
          <div style={{background:COLORS.white,borderRadius:14,padding:8,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
            {filteredWeeks.length===0 ? <div style={{padding:40,textAlign:'center',color:COLORS.muted}}>{t.noWeeks}</div>
            : filteredWeeks.reduce((acc,week,i)=>{
                const prevMonth = i>0 ? filteredWeeks[i-1].month : -1;
                if(week.month!==prevMonth) acc.push(<div key={'month-'+week.month} style={{padding:'14px 16px 6px 16px',fontSize:13,fontWeight:700,color:COLORS.muted,textTransform:'uppercase',letterSpacing:'0.5px',borderTop:i>0?'1px solid #F0EBE5':'none',marginTop:i>0?4:0}}>{MONTHS_SHORT[lang][week.month]} {year}</div>);
                acc.push(<WeekRow key={week.id} week={week} myBooking={myBookingMap[week.id]} allBookings={bookings} onBook={w=>setBookDialog({week:w,phase})} onRequestCancel={onRequestCancel} user={user} phase={phase} clanBookedByBranch={clanBookedByBranch} userBookedPriority={userBookedPriority} phaseActive={getPhaseStatus(phase,phaseConfig)==='active'||user.is_admin} t={t} lang={lang}/>);
                return acc;
              },[])}
          </div>
        </>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// CALENDAR VIEW
// ═══════════════════════════════════════════════════════
function CalendarView({bookings=[], weeks, year, boardEvents=[], clanRevealed, priorityRevealed, registeredUsers=[], user, t, lang}){
  const [calMonth, setCalMonth] = React.useState(()=>new Date().getMonth());
  const [calYear, setCalYear] = React.useState(()=>year);
  const [popup, setPopup] = React.useState(null);
  const today = toISO(new Date());
  const someHidden = !clanRevealed || !priorityRevealed;

  const goNext = ()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);};
  const goPrev = ()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);};
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const startDow = (new Date(calYear,calMonth,1).getDay()+6)%7;
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const calWeeks = calYear===year ? weeks : generateWeeks(calYear);
  const allItems = bookings.map(b=>{const w=calWeeks.find(wk=>wk.id===b.week_id);return{type:'booking',data:b,start:b.check_in_date||(w?w.start:''),end:b.check_out_date||(w?w.end:'')};});
  (boardEvents||[]).forEach(ev=>{allItems.push({type:'board',data:ev,start:ev.start_date,end:ev.end_date});});

  const dayBookings = {};
  for(let dd=1;dd<=daysInMonth;dd++){
    const ds = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    dayBookings[dd] = allItems.filter(item=>ds>=item.start&&ds<=item.end);
  }
  const rows = [];for(let ri=0;ri<cells.length;ri+=7) rows.push(cells.slice(ri,ri+7));
  const dayNames = [t.mon,t.tue,t.wed,t.thu,t.fri,t.sat,t.sun];
  const navBtnStyle = {padding:'8px 16px',border:'1.5px solid '+COLORS.border,borderRadius:8,background:COLORS.white,cursor:'pointer',fontSize:16,color:COLORS.text,fontFamily:"'DM Sans',sans-serif"};

  return (
    <div style={{maxWidth:960,margin:'0 auto',padding:'24px 20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:20}}>
        <button onClick={goPrev} style={navBtnStyle}>{'\u25C0'}</button>
        <h2 style={{fontSize:20,fontWeight:700,color:COLORS.text,fontFamily:"'Playfair Display',Georgia,serif",margin:0,minWidth:220,textAlign:'center'}}>{FULL_MONTHS[lang][calMonth]} {calYear}</h2>
        <button onClick={goNext} style={navBtnStyle}>{'\u25B6'}</button>
      </div>
      {someHidden && <div style={{background:'#C4853B10',border:'1px solid #C4853B30',borderRadius:12,padding:'12px 18px',fontSize:13,color:'#8B6030',display:'flex',alignItems:'center',gap:8,marginBottom:16}}>{'\u{1F512}'} {t.hiddenCalNote}</div>}
      <div style={{background:COLORS.white,borderRadius:14,padding:20,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
          {dayNames.map(name=><div key={name} style={{textAlign:'center',fontSize:11,fontWeight:700,color:COLORS.muted,padding:'8px 0',textTransform:'uppercase',letterSpacing:'0.5px'}}>{name}</div>)}
        </div>
        {rows.map((row,rowIdx)=>
          <div key={rowIdx} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
            {row.map((day,ci)=>{
              if(!day) return <div key={'e'+ci} style={{minHeight:64}}/>;
              const bks = dayBookings[day]||[];
              const isToday = (calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0'))===today;
              return <div key={day} style={{minHeight:64,padding:'3px 2px',position:'relative',border:isToday?'2px solid '+COLORS.accent:'2px solid transparent',borderRadius:6}}>
                <div style={{fontSize:12,fontWeight:isToday?700:400,color:COLORS.text,textAlign:'center',marginBottom:2}}>{day}</div>
                {bks.slice(0,3).map((item,bi)=>{
                  const isBoard = item.type==='board';
                  const b = item.data;
                  let barColor, label, isPending=false;
                  if(isBoard){barColor=COLORS.board;label=b.name;}
                  else{const br=FAMILY_BRANCHES.find(x=>x.id===b.branch_id);isPending=b.cancellation_status==='pending';barColor=b.open_to_share?COLORS.openToShare:isPending?(br?br.color:'#ccc')+'40':(br?br.color:'#ccc');label=shortName(b.user_name)+(b.open_to_share?' \u{1F91D}':'');}
                  const prevDay=ci>0?row[ci-1]:null;const nextDay=ci<6?row[ci+1]:null;
                  const itemId=isBoard?'board_'+b.id:b.id;
                  const prevHas=prevDay&&(dayBookings[prevDay]||[]).some(x=>(x.type==='board'?'board_'+x.data.id:x.data.id)===itemId);
                  const nextHas=nextDay&&(dayBookings[nextDay]||[]).some(x=>(x.type==='board'?'board_'+x.data.id:x.data.id)===itemId);
                  const radius=(!prevHas?'4px ':'0 ')+(!nextHas?'4px ':'0 ')+(!nextHas?'4px ':'0 ')+(!prevHas?'4px':'0');
                  return <div key={itemId+'_'+bi} onClick={e=>{e.stopPropagation();setPopup(item);}} style={{height:16,marginBottom:1,background:barColor+'CC',borderRadius:radius,cursor:'pointer',display:'flex',alignItems:'center',overflow:'hidden',paddingLeft:!prevHas?3:0}}>
                    {!prevHas && <span style={{fontSize:8,fontWeight:700,color:'white',whiteSpace:'nowrap',textOverflow:'ellipsis',overflow:'hidden',textDecoration:isPending?'line-through':'none'}}>{label}</span>}
                  </div>;
                })}
              </div>;
            })}
          </div>
        )}
      </div>

      {popup && <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.2)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setPopup(null)}>
        <div onClick={e=>e.stopPropagation()} style={{background:COLORS.white,borderRadius:14,padding:24,minWidth:280,maxWidth:400,boxShadow:'0 8px 32px rgba(0,0,0,0.15)'}}>
          {popup.type==='board' ? <>
            <h4 style={{fontSize:16,fontWeight:700,color:COLORS.board,margin:'0 0 8px 0'}}>{'\u{2728}'} {popup.data.name}</h4>
            <div style={{fontSize:13,color:COLORS.text}}>{formatDate(popup.data.start_date,lang)} &ndash; {formatDate(popup.data.end_date,lang)}</div>
            {popup.data.description && <div style={{fontSize:13,color:COLORS.muted,marginTop:6,fontStyle:'italic'}}>{popup.data.description}</div>}
            <div style={{fontSize:12,color:COLORS.board,marginTop:8}}>{popup.data.signup_count||0} {t.participants}</div>
          </> : <>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div style={{width:12,height:12,borderRadius:3,background:popup.data.open_to_share?COLORS.openToShare:(FAMILY_BRANCHES.find(x=>x.id===popup.data.branch_id)||{color:'#ccc'}).color}}/>
              <h4 style={{fontSize:16,fontWeight:700,color:COLORS.text,margin:0}}>{popup.data.user_name}</h4>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:13,color:COLORS.text}}>
              <div><strong>{t.branchLabel}: </strong>{popup.data.branch_name}</div>
              <div><strong>{t.phase}: </strong>{getPhaseName(popup.data.phase,t)}</div>
              {popup.data.remarks && <div style={{fontStyle:'italic',color:COLORS.muted}}><strong>{t.remarkLabel}: </strong>{popup.data.remarks}</div>}
              {popup.data.open_to_share && <div style={{color:COLORS.openToShare,fontWeight:600}}>{'\u{1F91D}'} {t.openToShare}</div>}
            </div>
          </>}
          <button onClick={()=>setPopup(null)} style={{marginTop:16,width:'100%',padding:'10px 0',background:COLORS.bg,border:'none',borderRadius:10,fontSize:14,fontWeight:500,color:'#5A4D40',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{t.close}</button>
        </div>
      </div>}
    </div>
  );
}

// LOGIN SCREEN
// ═══════════════════════════════════════════════════════
function LoginScreen({t, lang, onLangToggle, onLogin}){
  const [mode, setMode] = React.useState('login');
  const [email, setEmail] = React.useState('');
  const [selShareholder, setSelShareholder] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [shareholders, setShareholders] = React.useState([]);

  React.useEffect(()=>{
    api('branches/shareholders').then(d=>setShareholders(d||[])).catch(()=>{});
  },[]);

  const available = shareholders.filter(s=>!s.registered);
  const selectedSH = shareholders.find(s=>String(s.id)===selShareholder);
  const selectedBranch = selectedSH ? FAMILY_BRANCHES.find(b=>b.id===selectedSH.branch_id) : null;

  const handleSubmit = async (e)=>{
    e.preventDefault();setError('');setLoading(true);
    try {
      if(mode==='login'){
        if(!email.trim()||!pw.trim()){setError(t.fillAll);setLoading(false);return;}
        const data = await api('auth/login',{method:'POST',body:JSON.stringify({email:email.trim(),password:pw})});
        localStorage.setItem('fargny_token',data.token);
        onLogin(data.user);
      } else {
        if(!selShareholder||!email.trim()||!pw.trim()||!pw2.trim()){setError(t.fillAll);setLoading(false);return;}
        if(!email.includes('@')){setError(t.invalidEmail);setLoading(false);return;}
        if(pw!==pw2){setError(t.passwordMismatch);setLoading(false);return;}
        const data = await api('auth/register',{method:'POST',body:JSON.stringify({shareholder_id:parseInt(selShareholder),email:email.trim(),password:pw})});
        localStorage.setItem('fargny_token',data.token);
        onLogin(data.user);
      }
    } catch(err){
      setError(err.message);
    }
    setLoading(false);
  };

  const iS={width:'100%',padding:'12px 16px',border:'1px solid '+COLORS.border,borderRadius:8,fontSize:14,fontFamily:"'DM Sans',sans-serif",color:COLORS.text,outline:'none',marginBottom:12,boxSizing:'border-box'};

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:COLORS.bg,fontFamily:"'DM Sans',sans-serif",padding:20}}>
      <div style={{background:COLORS.white,borderRadius:16,padding:'48px 40px',maxWidth:420,width:'100%',boxShadow:'0 4px 24px rgba(44,24,16,0.08)',position:'relative'}}>
        <button onClick={onLangToggle} style={{position:'absolute',top:16,right:16,background:'none',border:'1px solid '+COLORS.border,borderRadius:8,padding:'4px 12px',cursor:'pointer',fontSize:13,color:COLORS.muted,fontFamily:"'DM Sans',sans-serif"}}>{lang==='en'?'NL':'EN'}</button>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,color:COLORS.text,margin:'0 0 4px 0',textAlign:'center'}}>{t.appName}</h1>
        <p style={{fontSize:14,color:COLORS.muted,margin:'0 0 32px 0',textAlign:'center'}}>{t.subtitle}</p>
        <div style={{display:'flex',gap:0,marginBottom:24,borderBottom:'2px solid '+COLORS.border}}>
          {['login','register'].map(m=><button key={m} onClick={()=>{setMode(m);setError('');}} style={{flex:1,padding:'10px 16px',background:'none',border:'none',borderBottom:'2px solid '+(mode===m?COLORS.accent:'transparent'),marginBottom:-2,cursor:'pointer',fontSize:14,fontWeight:600,color:mode===m?COLORS.text:COLORS.muted,fontFamily:"'DM Sans',sans-serif"}}>{m==='login'?t.signIn:t.register}</button>)}
        </div>
        <form onSubmit={handleSubmit}>
          {error && <div style={{background:'#FEF2F2',color:COLORS.danger,padding:'10px 14px',borderRadius:8,fontSize:13,marginBottom:12}}>{error}</div>}
          {mode==='login' && <>
            <input style={iS} type="email" placeholder={t.email} value={email} onChange={e=>setEmail(e.target.value)}/>
            <input style={iS} type="password" placeholder={t.password} value={pw} onChange={e=>setPw(e.target.value)}/>
          </>}
          {mode==='register' && <>
            <select style={iS} value={selShareholder} onChange={e=>setSelShareholder(e.target.value)}>
              <option value="">{t.pickShareholder}</option>
              {available.map(s=><option key={s.id} value={s.id}>{s.full_name} ({s.branch_name})</option>)}
            </select>
            {selectedBranch && <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:selectedBranch.color+'10',borderRadius:8,marginBottom:12,fontSize:13}}><div style={{width:10,height:10,borderRadius:3,background:selectedBranch.color}}/>{selectedBranch.name}</div>}
            <input style={iS} type="email" placeholder={t.email} value={email} onChange={e=>setEmail(e.target.value)}/>
            <input style={iS} type="password" placeholder={t.password} value={pw} onChange={e=>setPw(e.target.value)}/>
            <input style={iS} type="password" placeholder={t.confirmPassword} value={pw2} onChange={e=>setPw2(e.target.value)}/>
          </>}
          <button type="submit" disabled={loading} style={{width:'100%',padding:'14px 0',background:loading?'#D4C5B5':COLORS.accent,border:'none',borderRadius:10,fontSize:15,fontWeight:700,color:COLORS.white,cursor:loading?'default':'pointer',fontFamily:"'DM Sans',sans-serif",marginTop:8}}>{loading?t.loading:mode==='login'?t.signIn:t.createAccount}</button>
        </form>
      </div>
    </div>
  );
}

// APP (main component)
// ═══════════════════════════════════════════════════════
function App(){
  const [lang, setLang] = React.useState(()=>localStorage.getItem('fargny_lang')||'en');
  const [user, setUser] = React.useState(null);
  const [view, setView] = React.useState('book');
  const [year, setYear] = React.useState(2026);
  const [phase, setPhase] = React.useState('regular');
  const [bookings, setBookings] = React.useState([]);
  const [myBookings, setMyBookings] = React.useState([]);
  const [weeks, setWeeks] = React.useState([]);
  const [filterMonth, setFilterMonth] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [selectedBranch, setSelectedBranch] = React.useState(null);
  const [showAdmin, setShowAdmin] = React.useState(false);
  const [phaseConfig, setPhaseConfig] = React.useState(null);
  const [boardEvents, setBoardEvents] = React.useState([]);
  const [branchData, setBranchData] = React.useState([]);
  const [registeredUsers, setRegisteredUsers] = React.useState([]);
  const [calendarData, setCalendarData] = React.useState({bookings:[],clanRevealed:true,priorityRevealed:true});
  const [authChecked, setAuthChecked] = React.useState(false);

  const t = T[lang]||T.en;
  const showToast = (msg)=>{setToast(msg);setTimeout(()=>setToast(null),3500);};
  const toggleLang = ()=>{const next=lang==='en'?'nl':'en';setLang(next);localStorage.setItem('fargny_lang',next);};

  // Check auth on mount
  React.useEffect(()=>{
    const token = localStorage.getItem('fargny_token');
    if(!token){setAuthChecked(true);return;}
    api('auth/me').then(d=>{setUser(d.user);setAuthChecked(true);}).catch(()=>{localStorage.removeItem('fargny_token');setAuthChecked(true);});
  },[]);

  // Load data when user logs in or year changes
  React.useEffect(()=>{
    if(!user) return;
    const load = async ()=>{
      // Load each independently so one failure doesn't wipe out the others.
      // Also ALWAYS set weeks — fall back to client-side generation if API fails.
      setWeeks(generateWeeks(year));
      try {
        const bkData = await api(`bookings?year=${year}`);
        console.log('[Fargny] bookings response:', bkData);
        setBookings(bkData.bookings||[]);
        setMyBookings(bkData.my_bookings||[]);
        if(Array.isArray(bkData.weeks) && bkData.weeks.length>0) setWeeks(bkData.weeks);
      } catch(e){console.error('[Fargny] bookings load failed',e);}
      try { const pcData = await api(`phase-config?year=${year}`); setPhaseConfig(pcData); }
      catch(e){console.error('[Fargny] phase-config load failed',e);}
      try { const beData = await api('board-events'); setBoardEvents(beData||[]); }
      catch(e){console.error('[Fargny] board-events load failed',e);}
      try {
        const brData = await api('branches');
        setBranchData(brData||[]);
        const users = [];
        (brData||[]).forEach(br=>(br.members||[]).forEach(m=>{m.branch_id=br.id;users.push(m);}));
        setRegisteredUsers(users);
      } catch(e){console.error('[Fargny] branches load failed',e);}
    };
    load();
  },[user,year]);

  // Load calendar data
  React.useEffect(()=>{
    if(!user || view!=='calendar') return;
    api(`bookings/calendar?year=${year}`).then(d=>setCalendarData(d)).catch(()=>{});
  },[user,year,view]);

  const refreshData = async ()=>{
    try {
      const bkData = await api(`bookings?year=${year}`);
      setBookings(bkData.bookings||[]);
      setMyBookings(bkData.my_bookings||[]);
      setWeeks(bkData.weeks||generateWeeks(year));
      const beData = await api('board-events');
      setBoardEvents(beData||[]);
    } catch(e){}
  };

  const handleLogin = (userData)=>{setUser(userData);};
  const handleLogout = async ()=>{
    try{await api('auth/logout',{method:'POST'});}catch(e){}
    localStorage.removeItem('fargny_token');
    setUser(null);setBookings([]);setMyBookings([]);
  };

  const handleBook = async (week, bookingPhase, opts={})=>{
    try {
      await api('bookings',{method:'POST',body:JSON.stringify({
        week_id:week.id, year, phase:bookingPhase,
        open_to_share:opts.open_to_share||false,
        remarks:opts.remark||'',
        linked_user_ids:opts.linked_members||[],
        check_in_date:opts.custom_start||null,
        check_out_date:opts.custom_end||null,
      })});
      showToast(t.booked+': '+formatDate(week.start,lang)+' \u2014 '+formatDate(week.end,lang)+'\n'+t.confirmationEmailSent+' '+(user.email||''));
      await refreshData();
    } catch(e){showToast(e.message);}
  };

  const handleRequestCancel = async (booking)=>{
    try {
      await api(`bookings/${booking.id}`,{method:'DELETE'});
      showToast(t.cancelRequested);
      await refreshData();
    } catch(e){showToast(e.message);}
  };

  const handleApproveCancellation = async (id)=>{
    try{await api(`admin/approve-cancellation/${id}`,{method:'POST'});showToast(t.approveCancellation);await refreshData();}catch(e){showToast(e.message);}
  };
  const handleRejectCancellation = async (id)=>{
    try{await api(`admin/reject-cancellation/${id}`,{method:'POST'});showToast(t.rejectCancellation);await refreshData();}catch(e){showToast(e.message);}
  };
  const handleUpdatePayment = async (id,status)=>{
    try{await api(`admin/update-payment-status/${id}`,{method:'POST',body:JSON.stringify({status})});await refreshData();}catch(e){showToast(e.message);}
  };
  const handleSaveGuests = async (id, guests)=>{
    try{
      const guestData = [];
      for(let n=0;n<7;n++){guestData.push({child04:guests.child04[n]||0,child59:guests.child59[n]||0,adult:guests.adult[n]||0});}
      await api(`payments/${id}`,{method:'POST',body:JSON.stringify({guest_data:guestData})});
      showToast('\u2705 '+t.saveCosts);
      await refreshData();
    }catch(e){showToast(e.message);}
  };
  const handleAdminBook = async (weekId, targetUser, bookingPhase)=>{
    try{
      await api('admin/book',{method:'POST',body:JSON.stringify({user_id:targetUser.id,week_id:weekId,year,phase:bookingPhase})});
      showToast(t.booked+': '+targetUser.display_name);
      await refreshData();
    }catch(e){showToast(e.message);}
  };
  const handleCreateBoardEvent = async (ev)=>{
    try{
      await api('board-events',{method:'POST',body:JSON.stringify(ev)});
      showToast('\u{1F451} '+ev.name);
      await refreshData();
    }catch(e){showToast(e.message);}
  };
  const handleSignUpBoard = async (evId)=>{
    try{
      await api(`board-events/${evId}/signup`,{method:'POST'});
      showToast('\u2705 '+t.signedUp);
      await refreshData();
    }catch(e){showToast(e.message);}
  };
  const handleUnsignUpBoard = async (evId)=>{
    try{
      await api(`board-events/${evId}/signup`,{method:'DELETE'});
      showToast('\u2715 '+t.cancelSignup);
      await refreshData();
    }catch(e){showToast(e.message);}
  };

  if(!authChecked) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:COLORS.bg,fontFamily:"'DM Sans',sans-serif"}}><div style={{fontSize:16,color:COLORS.muted}}>{t.loading}</div></div>;
  if(!user) return <LoginScreen t={t} lang={lang} onLangToggle={toggleLang} onLogin={handleLogin}/>;

  // Prefer live branch list from the API so renames/new branches show
  // up without a redeploy. Fall back to the hardcoded list only if the
  // API hasn't returned yet.
  const userBranch = (branchData && branchData.find(b=>b.id===user.branch_id))
                     || FAMILY_BRANCHES.find(b=>b.id===user.branch_id)
                     || {name:'—',color:COLORS.muted};
  const totalBooked = bookings.filter(b=>b.cancellation_status!=='approved').length;
  const pendingCount = bookings.filter(b=>b.cancellation_status==='pending').length;
  const navItems = [{id:'book',label:t.book,emoji:'\u{1F4DD}'},{id:'calendar',label:t.calendar,emoji:'\u{1F4C5}'},{id:'feedback',label:t.feedback,emoji:'\u{1F4CB}'}];
  if(user.is_admin) navItems.push({id:'statistics',label:t.statistics,emoji:'\u{1F4CA}'});
  const branchMembers = selectedBranch ? (branchData.find(b=>b.id===selectedBranch.id)||{}).members||[] : [];

  return (
    <div style={{minHeight:'100vh',background:COLORS.bg,fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
      {selectedBranch && <BranchMembersPanel branch={selectedBranch} onClose={()=>setSelectedBranch(null)} t={t} members={branchMembers}/>}
      {showAdmin && <AdminPanel registeredUsers={registeredUsers} weeks={weeks} year={year} bookings={bookings} onBooked={handleAdminBook} onApproveCancellation={handleApproveCancellation} onRejectCancellation={handleRejectCancellation} onUpdatePayment={handleUpdatePayment} onCreateBoardEvent={handleCreateBoardEvent} onClose={()=>setShowAdmin(false)} t={t} lang={lang}/>}
      <Toast message={toast}/>

      {/* NAVBAR */}
      <div style={{background:COLORS.white,borderBottom:'1px solid '+COLORS.border,padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:22}}>{'\u{1F3E1}'}</span>
          <div><h1 style={{fontSize:18,fontWeight:700,color:COLORS.text,margin:0,fontFamily:"'Playfair Display',Georgia,serif"}}>Fargny</h1>
            <p style={{fontSize:11,color:COLORS.muted,margin:0}}>{year} &middot; {totalBooked} {t.weeksBooked}{pendingCount>0?' \u00B7 '+pendingCount+' pending':''}</p></div>
        </div>
        <div style={{display:'flex',gap:0,background:COLORS.bg,borderRadius:10,padding:3}}>
          {navItems.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{padding:'7px 16px',border:'none',borderRadius:8,background:view===v.id?COLORS.white:'transparent',color:view===v.id?COLORS.text:COLORS.muted,fontWeight:view===v.id?600:400,cursor:'pointer',fontSize:13,fontFamily:"'DM Sans',sans-serif",boxShadow:view===v.id?'0 1px 4px rgba(0,0,0,0.08)':'none'}}>{v.emoji} {v.label}</button>)}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={toggleLang} style={{padding:'6px 12px',border:'1.5px solid '+COLORS.border,borderRadius:8,background:COLORS.white,fontSize:12,fontWeight:600,color:COLORS.muted,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>{lang==='en'?'\u{1F1F3}\u{1F1F1} NL':'\u{1F1EC}\u{1F1E7} EN'}</button>
          <div style={{textAlign:'right'}}><div style={{fontSize:13,fontWeight:600,color:COLORS.text}}>{user.display_name}</div><div style={{fontSize:11,color:userBranch.color,fontWeight:600}}>{userBranch.name}</div></div>
          <button onClick={handleLogout} style={{padding:'7px 14px',background:'transparent',border:'1.5px solid #D4C5B5',borderRadius:8,fontSize:12,color:COLORS.muted,cursor:'pointer',fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>{t.signOut}</button>
        </div>
      </div>

      {view==='book' && <BookingView user={user} bookings={bookings} myBookings={myBookings} weeks={weeks} year={year} setYear={y=>{setYear(y);setFilterMonth(null);}} phase={phase} setPhase={setPhase} phaseConfig={phaseConfig} filterMonth={filterMonth} setFilterMonth={setFilterMonth} onSelectBranch={setSelectedBranch} onShowAdmin={()=>setShowAdmin(true)} onBook={handleBook} onRequestCancel={handleRequestCancel} onSaveGuests={handleSaveGuests} boardEvents={boardEvents} onSignUpBoard={handleSignUpBoard} onUnsignUpBoard={handleUnsignUpBoard} onCreateEvent={handleCreateBoardEvent} registeredUsers={registeredUsers} branchData={branchData} showToast={showToast} t={t} lang={lang}/>}
      {view==='calendar' && <CalendarView bookings={calendarData.bookings||[]} weeks={calendarData.weeks||weeks} year={year} boardEvents={boardEvents} clanRevealed={calendarData.clan_revealed!==false} priorityRevealed={calendarData.priority_revealed!==false} registeredUsers={registeredUsers} user={user} t={t} lang={lang}/>}
      {view==='feedback' && <FeedbackView t={t} lang={lang}/>}
      {view==='statistics' && <StatisticsView user={user} year={year} t={t} lang={lang}/>}
      <WhatsAppButton t={t}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('fargny-booking-root')).render(<App/>);
</script>
</body>
</html>
